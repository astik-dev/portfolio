<section class="projects">
    <div class="projects__container title-content">
        
        <h2 id="projects">Projects</h2>
       
        <div class="projects__items">
            @@projectItems
        </div>
    
        @@if (projectCount > 4) {
            <button
                class="projects__btn-load-more"
                data-umami-event="projects-load-more-click"
            >
                Load More
            </button>
        }

    </div>
</section>
