name: Monitor Umami Script

on:
  schedule:
    - cron: '0 18 * * *'
      timezone: 'Europe/Berlin'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      models: read
      issues: write

    steps:
      - name: Fetch latest Umami script
        run: curl -fsSL https://cloud.umami.is/script.js -o /tmp/umami-new.js

      - name: Fetch current js/u.js from gh-pages branch
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/js/u.js" \
            -o /tmp/umami-old.js

      - name: Compare files
        id: check
        run: |
          if diff -q /tmp/umami-old.js /tmp/umami-new.js > /dev/null 2>&1; then
            echo "status=unchanged" >> $GITHUB_OUTPUT
          else
            echo "status=changed" >> $GITHUB_OUTPUT
          fi

      - name: Format both files with Prettier
        if: steps.check.outputs.status == 'changed'
        run: |
          npx --yes prettier --parser babel /tmp/umami-old.js > /tmp/umami-old-fmt.js
          npx prettier --parser babel /tmp/umami-new.js > /tmp/umami-new-fmt.js

      - name: Generate diff
        if: steps.check.outputs.status == 'changed'
        run: |
          diff -U 999999 /tmp/umami-old-fmt.js /tmp/umami-new-fmt.js > /tmp/umami.diff || true

      - name: Analyze changes with AI
        if: steps.check.outputs.status == 'changed'
        id: ai
        uses: actions/github-script@v9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const oldCode = fs.readFileSync('/tmp/umami-old-fmt.js', 'utf8');
            const newCode = fs.readFileSync('/tmp/umami-new-fmt.js', 'utf8');

            const response = await fetch('https://models.github.ai/inference/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                model: 'openai/gpt-4.1',
                temperature: 0.2, // low temperature = more focused, less creative
                messages: [
                  {
                    role: 'system',
                    content: `You are a security-focused JavaScript code reviewer.
                              You will receive two versions of a minified analytics script.
                              Your job is to identify any behavioral or logical changes.
                              Completely ignore variable, function, and parameter name changes — those are caused by minification and are not relevant.
                              Focus only on: new network requests, added/removed logic, changed conditions, new data being collected or sent, any suspicious code.
                              Be concise and clear.
                              For each change you identify, include a short code diff to show the exact affected snippet, so the location and nature of the change is unambiguous.`
                  },
                  {
                    role: 'user',
                    content: `Compare these two versions and describe what changed in behavior or logic.\n\nOLD VERSION:\n${oldCode}\n\nNEW VERSION:\n${newCode}`
                  }
                ]
              })
            });

            const data = await response.json();
            const analysis = data.choices[0].message.content;
            core.setOutput('analysis', analysis);

      - name: Open GitHub Issue with diff
        if: steps.check.outputs.status == 'changed'
        uses: actions/github-script@v9
        env:
          AI_ANALYSIS: ${{ steps.ai.outputs.analysis }}
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('/tmp/umami.diff', 'utf8');
            const analysis = process.env.AI_ANALYSIS;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ umami script has changed',
              body: '```diff\n' + diff + '\n```\n' + '## 🤖 AI Analysis\n' + analysis,
            });
